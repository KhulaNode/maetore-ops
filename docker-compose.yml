services:
  caddy:
    image: caddy:2-alpine
    container_name: maetore-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - .:/srv:ro
    depends_on:
      api:
        condition: service_started

  api:
    build: ./api
    container_name: maetore-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
